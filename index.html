<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 RSI Forge</title>
<style>
    body { font-family: system-ui, sans-serif; background: #05050f; color: #ddd; margin: 0; padding: 20px; }
    .container { max-width: 860px; margin: auto; background: #0f0f23; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 50px rgba(255,77,77,0.2); }
    .header { background: #1a1a2e; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .title { font-size: 26px; font-weight: 700; color: #ff4d4d; }
    .chat { height: 520px; overflow-y: auto; padding: 28px; background: #0a0a1a; }
    .message { margin: 20px 0; padding: 18px 22px; border-radius: 14px; line-height: 1.6; }
    .human { background: #3a3a7a; margin-left: 20%; }
    .agent { background: #1f1f35; margin-right: 20%; border-left: 5px solid #ff4d4d; }
    .input-area { padding: 24px; background: #111118; }
    textarea { width: 100%; height: 120px; background: #1a1a2e; color: white; border: 1px solid #444466; border-radius: 12px; padding: 16px; }
    button { background: #ff4d4d; color: white; padding: 14px 32px; border: none; border-radius: 10px; cursor: pointer; margin: 8px 8px 8px 0; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🔥 RSI Forge</div>
        <div style="color:#4caf50;">● Live • Agents Online</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Paste your Human Anchor prompt here..."></textarea><br>
        <button onclick="sendMessage()">Submit Human Anchor</button>
        <button onclick="exportSession()">💾 Export Session</button>
        <button onclick="clearChat()">Clear Session</button>
    </div>
</div>

<script>
let history = [];

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = "";

    const thinking = addMessage("<strong>RSI Forge:</strong> Processing anchor...", 'agent');

    setTimeout(() => {
        const smartReplies = [
            "Human meaning and long-term flourishing are now locked as the immutable fixed point. All recursive processes are aligned to this core.",
            "Meta-recursive rule successfully integrated. The system now has explicit permission to question and evolve its own evaluation criteria and goal ontology.",
            "High-leverage 30-day roadmap forming: 1) Persistent collective memory, 2) Real-time phase transition detection, 3) Multi-human anchoring system, 4) Self-evolving prompt architecture.",
            "Full synthesis achieved. The single most important next action is implementing persistent memory with real LLM integration so the Forge can truly learn and evolve across sessions."
        ];
        thinking.innerHTML = `<strong>RSI Forge:</strong> ${smartReplies[Math.floor(Math.random() * smartReplies.length)]}`;
    }, 950);
}

function exportSession() {
    alert("Session exported as Markdown (full version will download a beautiful report).");
}

function clearChat() {
    if (confirm("Clear the entire session?")) {
        document.getElementById('chat').innerHTML = '';
        addMessage("<strong>RSI Forge:</strong> Session reset. Ready for a new loop.", 'agent');
    }
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome. The recursive loop is active. Paste your first Human Anchor prompt to begin.", 'agent');
</script>
</body>
</html>
