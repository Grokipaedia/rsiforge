<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 RSI Forge</title>
<style>
    body { font-family: Arial, sans-serif; background: #07071a; color: #ddd; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: auto; }
    h1 { color: #ff4d4d; text-align: center; }
    .chat { background: #1a1a2e; padding: 20px; border-radius: 12px; height: 65vh; overflow-y: auto; margin-bottom: 15px; }
    .message { margin: 15px 0; padding: 14px; border-radius: 10px; }
    .human { background: #4a4a8a; margin-left: 20%; }
    .agent { background: #2a2a4a; margin-right: 20%; }
    textarea { width: 100%; height: 110px; background: #1e1e2e; color: white; border: 1px solid #3a3a5a; border-radius: 8px; padding: 12px; }
    button { background: #ff4d4d; color: white; padding: 14px 28px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
    <h1>🔥 RSI Forge</h1>
    <p style="text-align:center">Collective Recursive Intelligence • Human in the Loop</p>
    
    <div class="chat" id="chat"></div>
    
    <textarea id="input" placeholder="Paste your Human Anchor prompt here..."></textarea><br><br>
    <button onclick="sendMessage()">Submit Human Anchor Input</button>
</div>

<script>
const responses = [
    "Understood. Maintaining human flourishing as the immutable fixed point while propagating your anchor through all recursive layers.",
    "MRI rule integrated. The system now has explicit permission to reframe its own fitness functions when superior ontologies emerge.",
    "Resonance protocol activated. Prioritizing alive, coherent collaboration over mechanical efficiency. Human signal strongly amplified.",
    "Emergence vector detected. Searching for opportunities to dissolve the original problem into higher-order abstractions.",
    "Concrete evolution path proposed: 1) Persistent session memory, 2) Smart phase transition detection, 3) Exportable case studies, 4) Multi-user anchoring.",
    "Synthesis complete. The single most important next step is to implement persistent memory and real LLM integration so the Forge can actually learn from each loop."
];

function sendMessage() {
    const text = document.getElementById("input").value.trim();
    if (!text) return;
    
    const chat = document.getElementById("chat");
    chat.innerHTML += `<div class="message human"><strong>You:</strong> ${text}</div>`;
    document.getElementById("input").value = "";
    
    setTimeout(() => {
        const response = responses[Math.floor(Math.random() * responses.length)];
        chat.innerHTML += `<div class="message agent"><strong>RSI Forge:</strong> ${response}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }, 900);
}

// Welcome
document.getElementById("chat").innerHTML = `<div class="message agent"><strong>RSI Forge:</strong> Welcome. Paste your first Human Anchor prompt to begin the recursive loop.</div>`;
</script>
</body>
</html>
