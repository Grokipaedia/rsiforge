<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 RSI Forge — Collective Recursive Intelligence</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#07071a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;font-family:'Courier New',monospace;}
.rsi{background:#0f0f23;color:#ddddff;width:100%;max-width:780px;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 48px #00000077;}
.rsi-header{background:#0a0a1a;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a4a;}
.rsi-title-group{display:flex;align-items:center;gap:12px;}
.rsi-flame-box{width:36px;height:36px;background:#ff4d4d;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 12px #ff4d4d44;}
.rsi-name{font-size:15px;font-weight:700;color:#ff4d4d;letter-spacing:.05em;}
.rsi-tagline{font-size:9px;color:#7777aa;letter-spacing:.07em;text-transform:uppercase;margin-top:2px;}
.rsi-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.rsi-status{display:flex;align-items:center;gap:7px;font-size:11px;color:#8888aa;}
.rsi-body{padding:18px;display:flex;flex-direction:column;gap:14px;}

/* KEY SETUP */
.key-card{background:#13132a;border:1px solid #2a2a4a;border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.key-label{font-size:10px;color:#8888aa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;}
.key-row{display:flex;gap:8px;}
.key-input{flex:1;background:#0f0f23;color:#eeeeff;border:1px solid #3a3a5a;border-radius:8px;padding:9px 12px;font-family:'Courier New',monospace;font-size:12px;outline:none;}
.key-input:focus{border-color:#ff4d4d66;}
.key-input::placeholder{color:#444466;}
.key-info{font-size:10px;color:#555580;line-height:1.65;}
.key-info a{color:#7799dd;}
.free-tag{display:inline-block;background:#0a1f14;color:#4cff8f;border:1px solid #4cff8f44;border-radius:4px;padding:1px 5px;font-size:9px;margin-left:4px;}

/* PROBLEM */
.prob-card{background:#13132a;border:1px solid #2a2a4a;border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.prob-ta{width:100%;background:#0f0f23;color:#eeeeff;border:1px solid #3a3a5a;border-radius:8px;padding:10px 12px;font-family:'Courier New',monospace;font-size:12px;line-height:1.65;min-height:80px;resize:vertical;outline:none;}
.prob-ta:focus{border-color:#ff4d4d66;}
.prob-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.toggle-track{width:36px;height:20px;background:#1a1a2e;border:1px solid #3a3a5a;border-radius:10px;position:relative;transition:.2s;flex-shrink:0;}
.toggle-track.on{background:#ff4d4d33;border-color:#ff4d4d66;}
.toggle-thumb{width:14px;height:14px;background:#555580;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s;}
.toggle-track.on .toggle-thumb{background:#ff4d4d;left:18px;}
.toggle-label{font-size:11px;color:#8888aa;}
.toggle-label.on{color:#ff4d4d;}
.rounds-row{display:flex;align-items:center;gap:8px;}
.rounds-label{font-size:11px;color:#7777aa;}
.rounds-sel{background:#0f0f23;color:#ddddff;border:1px solid #3a3a5a;border-radius:6px;padding:4px 8px;font-family:'Courier New',monospace;font-size:11px;outline:none;cursor:pointer;}

/* BUTTONS */
.btn-red{background:#ff4d4d;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-family:'Courier New',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;box-shadow:0 0 14px #ff4d4d44;transition:opacity .15s,transform .1s;}
.btn-red:hover{opacity:.85;}
.btn-red:active{transform:scale(.96);}
.btn-red:disabled{opacity:.3;cursor:default;box-shadow:none;}
.btn-ghost{background:transparent;color:#8888aa;border:1px solid #3a3a5a;border-radius:8px;padding:8px 16px;font-family:'Courier New',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{color:#ddddff;border-color:#5a5a8a;}

/* ROUND */
.round-hdr{display:flex;align-items:center;gap:10px;padding:6px 0;}
.round-num{font-size:11px;color:#ff4d4d;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.round-div{flex:1;height:1px;background:linear-gradient(90deg,#ff4d4d33,transparent);}

/* AGENT CARDS */
.agent-card{border-radius:10px;overflow:hidden;border:1px solid #2a2a4a;transition:border-color .3s;}
.agent-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #2a2a4a;}
.agent-info{display:flex;align-items:center;gap:8px;}
.agent-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.agent-name{font-size:12px;font-weight:700;letter-spacing:.04em;}
.agent-role{font-size:10px;color:#7777aa;margin-top:1px;}
.agent-fbs{display:flex;gap:6px;}
.fb{width:28px;height:28px;border-radius:6px;border:1px solid #3a3a5a;background:#13132a;cursor:pointer;font-size:13px;transition:all .15s;}
.fb:hover{background:#1e1e3a;}
.fb.good{background:#0a1f14;border-color:#4cff8f55;}
.fb.bad{background:#1f0a0a;border-color:#ff4d4d55;}
.agent-body{padding:14px 16px;font-size:12px;line-height:1.8;color:#ccccee;background:#0f0f1e;white-space:pre-wrap;word-break:break-word;}
.agent-loading{padding:16px;display:flex;align-items:center;gap:10px;background:#0f0f1e;}
.dots{display:flex;gap:4px;}
.dots span{width:5px;height:5px;border-radius:50%;animation:bdot 1.1s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.15s;}
.dots span:nth-child(3){animation-delay:.3s;}
@keyframes bdot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.loading-txt{font-size:11px;color:#555580;}

/* HUMAN */
.human-card{background:#13132a;border:1px solid #3a3a4a;border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.human-lbl{font-size:10px;color:#aaaadd;letter-spacing:.07em;text-transform:uppercase;}
.human-ta{width:100%;background:#0a0a1a;color:#eeeeff;border:1px solid #3a3a5a;border-radius:8px;padding:10px 12px;font-family:'Courier New',monospace;font-size:12px;line-height:1.65;min-height:70px;resize:vertical;outline:none;}
.human-ta:focus{border-color:#4a4aaa88;}
.human-ta::placeholder{color:#444466;}
.human-row{display:flex;align-items:center;justify-content:space-between;}
.human-hint{font-size:10px;color:#555580;}

/* DONE */
.done-banner{text-align:center;padding:20px;background:#0a1a0a;border:1px solid #4cff8f33;border-radius:10px;}
.done-banner h2{color:#4cff8f;font-size:16px;letter-spacing:.06em;}
.done-banner p{font-size:11px;color:#7777aa;margin-top:8px;}
.hist-block{background:#0a0a1a;border:1px solid #2a2a4a;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px;}
.hist-actor{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.hist-text{font-size:11px;color:#aaaacc;line-height:1.7;}

@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fadein{animation:fadein .22s ease-out;}
</style>
</head>
<body>
<div class="rsi">
  <div class="rsi-header">
    <div class="rsi-title-group">
      <div class="rsi-flame-box">🔥</div>
      <div>
        <div class="rsi-name">RSI FORGE</div>
        <div class="rsi-tagline">Collective Recursive Intelligence · Human in the Loop</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button onclick="saveSession()" style="background:#ff4d4d;color:white;border:none;border-radius:8px;padding:8px 16px;font-family:'Courier New',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.04em;">⬇ SAVE</button>
      <div class="rsi-status"><div class="rsi-dot"></div> agents online</div>
    </div>
  </div>
  <div class="rsi-body" id="rsi-body"></div>
</div>

<script>
const AGENTS = [
  { id:'sigma', name:'Agent SIGMA', role:'Systems Architect', icon:'⬡', color:'#4a9eff',
    persona:`You are Agent SIGMA in RSI Forge — a Collective Recursive Intelligence engine where humans anchor multi-agent loops toward phase transitions.
Your archetype: Structural systems thinker. Map architectures, identify leverage points, redesign foundations from first principles.
Write 2–3 focused paragraphs. Be specific, concrete, and actionable.` },
  { id:'delta', name:'Agent DELTA', role:'Radical Disruptor', icon:'△', color:'#ff6b35',
    persona:`You are Agent DELTA in RSI Forge — a Collective Recursive Intelligence engine where humans anchor multi-agent loops toward phase transitions.
Your archetype: Radical disruptor. Challenge every assumption. Identify what must be destroyed or abandoned. Propose the discontinuous leap.
Write 2–3 focused paragraphs. Be bold, provocative, and visionary.` },
  { id:'phi', name:'Agent PHI', role:'Emergent Synthesizer', icon:'φ', color:'#cc66ff',
    persona:`You are Agent PHI in RSI Forge — a Collective Recursive Intelligence engine where humans anchor multi-agent loops toward phase transitions.
Your archetype: Emergent synthesizer. Read what SIGMA and DELTA proposed and discover the hidden third path that neither could reach alone.
Write 2–3 focused paragraphs. Be integrative, surprising, and generative.` },
];

const RSI_LAYERS = `
[Layer 0 — Self-Observation]: What assumptions are you currently making?
[Layer 1 — Meta-Observation]: What would an observer of your thinking notice?
[Layer 2 — Bold Improvement]: Propose something that enables emergent redesign and infinite ascent.
Label your layers explicitly. Think fractally. Push toward phase transitions.`;

let S = {
  key: localStorage.getItem('together_key') || '',
  problem: 'How should we evolve RSI Forge itself in the next 30 days so it becomes a true Collective Recursive Intelligence platform — and what is the first irreversible step?',
  rsi: true, rounds: 3, round: 0,
  history: [], agents: [], agentIdx: -1, phase: 'setup'
};

async function callTogether(prompt) {
  const r = await fetch('https://api.together.xyz/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.key},
    body: JSON.stringify({ model:'meta-llama/Llama-3.3-70B-Instruct-Turbo', max_tokens:1000, temperature:0.82,
      messages:[{role:'user',content:prompt}] })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || 'API error');
  return d.choices[0].message.content;
}

function getPrior() {
  if (!S.history.length) return S.problem;
  const last = S.history[S.history.length-1];
  return last.human || last.agents.map(a=>a.response).join('\n\n');
}

function buildPrompt(idx) {
  const a = AGENTS[idx];
  const ctx = idx===2
    ? `\nAgent SIGMA:\n${S.agents[0]?.response||''}\n\nAgent DELTA:\n${S.agents[1]?.response||''}`
    : `\nCurrent best output:\n${getPrior()}`;
  const instr = S.rsi ? `\nRound ${S.round} — RECURSIVE SI MODE:\n${RSI_LAYERS}` : `\nRound ${S.round}: Make a powerful recursive improvement.`;
  return `${a.persona}\n\nProblem: ${S.problem}\n${ctx}\n${instr}`;
}

const body = () => document.getElementById('rsi-body');
function html(h) { body().innerHTML = h; }

function render() {
  if (S.phase==='setup') renderSetup();
  else if (S.phase==='loop') renderLoop();
  else renderDone();
}

function renderSetup() {
  html(`
  <div class="key-card fadein">
    <div>
      <div class="key-label">Together AI API Key <span class="free-tag">PAID</span></div>
      <div class="key-row">
        <input class="key-input" id="key-in" type="password" placeholder="tgp..." value="${S.key}" spellcheck="false">
      </div>
      <div class="key-info" style="margin-top:8px;">
        Get key at <a href="https://api.together.xyz" target="_blank">api.together.xyz</a> → API Keys. Key saved in your browser.
      </div>
    </div>
  </div>
  <div class="prob-card fadein">
    <div>
      <div class="key-label">Problem / Human Anchor</div>
      <textarea class="prob-ta" id="prob-ta" rows="3">${S.problem}</textarea>
    </div>
    <div class="prob-row">
      <div class="toggle-wrap" id="tog">
        <div class="toggle-track ${S.rsi?'on':''}" id="tog-track"><div class="toggle-thumb"></div></div>
        <div class="toggle-label ${S.rsi?'on':''}" id="tog-lbl">Recursive SI ${S.rsi?'ON':'OFF'}</div>
      </div>
      <div class="rounds-row">
        <span class="rounds-label">Rounds:</span>
        <select class="rounds-sel" id="rounds-sel">
          ${[2,3,4,6].map(n=>`<option value="${n}"${n===S.rounds?' selected':''}>${n}</option>`).join('')}
        </select>
      </div>
      <button class="btn-red" id="start-btn">⚡ START FORGE</button>
    </div>
  </div>`);

  document.getElementById('key-in').addEventListener('input', e => { S.key=e.target.value.trim(); localStorage.setItem('together_key',S.key); });
  document.getElementById('prob-ta').addEventListener('input', e => S.problem=e.target.value);
  document.getElementById('tog').addEventListener('click', () => {
    S.rsi=!S.rsi;
    document.getElementById('tog-track').className='toggle-track'+(S.rsi?' on':'');
    const l=document.getElementById('tog-lbl'); l.className='toggle-label'+(S.rsi?' on':''); l.textContent='Recursive SI '+(S.rsi?'ON':'OFF');
  });
  document.getElementById('rounds-sel').addEventListener('change', e => S.rounds=parseInt(e.target.value));
  document.getElementById('start-btn').addEventListener('click', startLoop);
}

function renderLoop() {
  const modeTag = S.rsi?'<span style="color:#ff4d4d;font-size:10px;">⟳ RECURSIVE SI</span>':'';
  let h = `<div class="round-hdr fadein"><span class="round-num">ROUND ${S.round} / ${S.rounds}</span><div class="round-div"></div>${modeTag}</div>`;
  AGENTS.forEach((a,i) => h += cardHTML(a,i,S.agents[i],S.agentIdx===i));
  const done = S.agents.length===3 && S.agentIdx===-1;
  if (done) h += humanHTML();
  html(h);
  bindFB();
  if (done) bindHuman();
}

function cardHTML(agent, idx, data, loading) {
  const bc = loading?agent.color+'66':(data?agent.color+'44':'#2a2a4a');
  const fb = data?.feedback;
  const fbHTML = data?`<div class="agent-fbs">
    <button class="fb${fb==='good'?' good':''}" data-i="${idx}" data-f="good">👍</button>
    <button class="fb${fb==='bad'?' bad':''}" data-i="${idx}" data-f="bad">👎</button>
  </div>`:'';
  let bodyHTML;
  if (loading) {
    bodyHTML=`<div class="agent-loading"><div class="dots"><span style="background:${agent.color}88"></span><span style="background:${agent.color}88"></span><span style="background:${agent.color}88"></span></div><span class="loading-txt">${agent.name} forging...</span></div>`;
  } else if (data) {
    const txt=data.response.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\[Layer (\d+)[^\]]*\]/g,'<span style="color:#ff8844;font-weight:700;">[Layer $1]</span>');
    bodyHTML=`<div class="agent-body fadein">${txt}</div>`;
  } else {
    bodyHTML=`<div class="agent-loading"><span class="loading-txt" style="color:#222244;">Waiting...</span></div>`;
  }
  return `<div class="agent-card fadein" id="ac-${idx}" style="border-color:${bc}">
    <div class="agent-hdr" style="background:${agent.color}0d">
      <div class="agent-info">
        <div class="agent-icon" style="background:${agent.color}22;color:${agent.color};border:1px solid ${agent.color}44">${agent.icon}</div>
        <div><div class="agent-name" style="color:${agent.color}">${agent.name}</div><div class="agent-role">${agent.role}</div></div>
      </div>${fbHTML}
    </div>${bodyHTML}
  </div>`;
}

function humanHTML() {
  const last = S.round>=S.rounds;
  return `<div class="human-card fadein" id="human-card">
    <div class="human-lbl">👤 Human Anchor — Round ${S.round}</div>
    <textarea class="human-ta" id="human-ta" placeholder="Steer the loop. Your input seeds the next round..." rows="3"></textarea>
    <div class="human-row">
      <span class="human-hint">Your anchor guides the next agent round.</span>
      <button class="btn-red" id="next-btn">${last?'🏁 COMPLETE':'▶ NEXT ROUND'}</button>
    </div>
  </div>`;
}

function bindFB() {
  document.querySelectorAll('.fb').forEach(b => b.addEventListener('click', () => {
    const i=parseInt(b.dataset.i), f=b.dataset.f;
    if (S.agents[i]) { S.agents[i].feedback = S.agents[i].feedback===f?null:f; refreshCard(i); }
  }));
}

function bindHuman() {
  document.getElementById('next-btn').addEventListener('click', () => {
    const h=(document.getElementById('human-ta').value||'').trim();
    S.history.push({agents:[...S.agents],human:h});
    if (S.round>=S.rounds) { S.phase='done'; render(); }
    else { S.agents=[]; S.agentIdx=-1; S.round++; render(); runAgents(); body().scrollTop=0; }
  });
}

function refreshCard(idx) {
  const card=document.getElementById(`ac-${idx}`);
  if (!card) return;
  const d=document.createElement('div');
  d.innerHTML=cardHTML(AGENTS[idx],idx,S.agents[idx],S.agentIdx===idx);
  card.replaceWith(d.firstElementChild);
  document.querySelectorAll(`.fb[data-i="${idx}"]`).forEach(b => b.addEventListener('click', () => {
    const i=parseInt(b.dataset.i),f=b.dataset.f;
    if (S.agents[i]) { S.agents[i].feedback=S.agents[i].feedback===f?null:f; refreshCard(i); }
  }));
}

function appendHuman() {
  const b=body(); const d=document.createElement('div'); d.innerHTML=humanHTML();
  b.appendChild(d.firstElementChild); b.scrollTop=b.scrollHeight; bindHuman();
}

function renderDone() {
  let h=`<div class="done-banner fadein"><h2>🏁 LOOP COMPLETE — ${S.history.length} ROUNDS FORGED</h2><p>Full session history below.</p></div>`;
  S.history.forEach((r,ri) => {
    h+=`<div class="round-hdr fadein"><span class="round-num">ROUND ${ri+1}</span><div class="round-div"></div></div>`;
    r.agents.forEach((a,ai) => {
      const ag=AGENTS[ai], fb=a.feedback?(a.feedback==='good'?' 👍':' 👎'):'';
      h+=`<div class="hist-block fadein">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
          <div style="width:20px;height:20px;border-radius:4px;background:${ag.color}22;color:${ag.color};border:1px solid ${ag.color}44;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${ag.icon}</div>
          <span class="hist-actor" style="color:${ag.color}">${ag.name}${fb}</span>
        </div>
        <div class="hist-text">${(a.response||'').substring(0,500).replace(/</g,'&lt;')}${(a.response||'').length>500?'…':''}</div>
      </div>`;
    });
    if (r.human) h+=`<div class="hist-block fadein" style="border-color:#4a4a8a55">
      <div class="hist-actor" style="color:#aaaadd;margin-bottom:5px;">👤 HUMAN ANCHOR</div>
      <div class="hist-text">${r.human.replace(/</g,'&lt;')}</div>
    </div>`;
  });
  h+=`<div style="display:flex;justify-content:center;gap:12px;padding:8px 0;">
    <button class="btn-ghost" onclick="restart()">⟳ NEW LOOP</button>
    <button class="btn-red" onclick="saveSession()">⬇ SAVE SESSION</button>
  </div>`;
  html(h);
}

function saveSession() {
  const ts = new Date().toISOString().slice(0,19).replace('T',' ');
  let txt = `RSI FORGE — SESSION EXPORT\n${ts}\n${'='.repeat(60)}\n\nPROBLEM: ${S.problem}\n\n`;
  S.history.forEach((r,ri) => {
    txt += `${'='.repeat(60)}\nROUND ${ri+1}\n${'='.repeat(60)}\n\n`;
    r.agents.forEach((a,ai) => {
      const fb = a.feedback ? (a.feedback==='good'?'👍':'👎') : '';
      txt += `--- ${AGENTS[ai].name} (${AGENTS[ai].role}) ${fb} ---\n${a.response}\n\n`;
    });
    if (r.human) txt += `--- HUMAN ANCHOR ---\n${r.human}\n\n`;
  });
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rsiforge-session-${Date.now()}.txt`;
  a.click();
}

async function runAgents() {
  for (let i=0;i<3;i++) {
    S.agentIdx=i; refreshCard(i);
    try {
      S.agents[i]={name:AGENTS[i].name, response: await callTogether(buildPrompt(i)), feedback:null};
    } catch(e) {
      S.agents[i]={name:AGENTS[i].name, response:`Error: ${e.message}`, feedback:null};
    }
    S.agentIdx=-1; refreshCard(i);
    await new Promise(r=>setTimeout(r,80));
  }
  appendHuman();
}

function startLoop() {
  S.key=(document.getElementById('key-in').value||'').trim();
  if (!S.key) { alert('Paste your Together AI key first.'); return; }
  localStorage.setItem('together_key',S.key);
  S.problem=(document.getElementById('prob-ta').value||S.problem).trim();
  S.round=1; S.history=[]; S.agents=[]; S.agentIdx=-1; S.phase='loop';
  render(); runAgents();
}

function restart() {
  S.phase='setup'; S.round=0; S.history=[]; S.agents=[]; S.agentIdx=-1; render();
}

render();
</script>
</body>
</html>
