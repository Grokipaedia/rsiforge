<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 RSI Forge</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #07071a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: 'Courier New', monospace; }
.rsi { background: #0f0f23; border-radius: 14px; overflow: hidden; width: 100%; max-width: 720px; display: flex; flex-direction: column; box-shadow: 0 8px 40px #00000066; }
.rsi-header { background: #0a0a1a; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a4a; }
.rsi-title-group { display: flex; align-items: center; gap: 12px; }
.rsi-flame-box { width: 36px; height: 36px; background: #ff4d4d; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px #ff4d4d55; }
.rsi-flame-box i { color: white; font-size: 20px; }
.rsi-name { font-size: 16px; font-weight: 700; color: #ff4d4d; letter-spacing: 0.04em; }
.rsi-tagline { font-size: 10px; color: #8888aa; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.rsi-status { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #8888aa; letter-spacing: 0.05em; }
.rsi-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.rsi-chat { flex: 1; height: 420px; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; background: #0f0f23; scroll-behavior: smooth; }
.rsi-chat::-webkit-scrollbar { width: 4px; }
.rsi-chat::-webkit-scrollbar-track { background: #0f0f23; }
.rsi-chat::-webkit-scrollbar-thumb { background: #3a3a6a; border-radius: 4px; }
.rsi-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 100%; color: #6666aa; font-size: 13px; letter-spacing: 0.03em; }
.rsi-empty i { font-size: 32px; }
.rsi-msg { display: flex; gap: 10px; align-items: flex-start; animation: pop 0.2s ease-out; }
@keyframes pop { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.rsi-msg.you { flex-direction: row-reverse; }
.rsi-av { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.av-agent { background: #1e1e3a; border: 1px solid #ff4d4d66; color: #ff4d4d; }
.av-you { background: #2a2a55; border: 1px solid #6a6aaa88; color: #aaaadd; }
.rsi-bubble-wrap { max-width: 76%; display: flex; flex-direction: column; gap: 4px; }
.rsi-msg.you .rsi-bubble-wrap { align-items: flex-end; }
.rsi-bubble { padding: 11px 15px; font-size: 13px; line-height: 1.65; }
.rsi-msg.agent .rsi-bubble { background: #1a1a2e; border: 1px solid #3a3a5a; color: #ddddff; border-radius: 3px 10px 10px 10px; }
.rsi-msg.you .rsi-bubble { background: #4a4a8a; border: 1px solid #6a6aaa; color: #ffffff; border-radius: 10px 3px 10px 10px; }
.rsi-meta { font-size: 10px; color: #6666aa; letter-spacing: 0.03em; padding: 0 2px; }
.rsi-typing-bubble { background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 3px 10px 10px 10px; padding: 13px 18px; display: flex; gap: 5px; align-items: center; }
.rsi-typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: #ff4d4d99; animation: bounce 1.1s ease-in-out infinite; }
.rsi-typing-bubble span:nth-child(2){animation-delay:.15s;}
.rsi-typing-bubble span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.rsi-footer { background: #0a0a1a; padding: 16px 18px; border-top: 1px solid #2a2a4a; display: flex; flex-direction: column; gap: 10px; }
.rsi-input-row { display: flex; gap: 10px; align-items: flex-end; }
textarea.rsi-ta { flex: 1; resize: none; font-family: 'Courier New', monospace; font-size: 13px; background: #13132a; color: #eeeeff; border: 1px solid #3a3a5a; border-radius: 8px; padding: 11px 14px; line-height: 1.55; min-height: 70px; max-height: 130px; outline: none; transition: border-color 0.15s; }
textarea.rsi-ta::placeholder { color: #6666aa; }
textarea.rsi-ta:focus { border-color: #ff4d4d88; box-shadow: 0 0 0 2px #ff4d4d18; }
.rsi-actions { display: flex; align-items: center; justify-content: space-between; }
.rsi-hints { font-size: 11px; color: #7777aa; letter-spacing: 0.03em; }
.rsi-right { display: flex; align-items: center; gap: 12px; }
.rsi-count { font-size: 11px; color: #7777aa; letter-spacing: 0.02em; }
.rsi-count.warn { color: #e0901a; }
.rsi-clear { font-size: 11px; color: #7777aa; background: none; border: none; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 0.03em; padding: 0; }
.rsi-clear:hover { color: #aaaacc; }
.rsi-send { background: #ff4d4d; border: none; border-radius: 8px; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s, transform 0.1s; flex-shrink: 0; box-shadow: 0 0 10px #ff4d4d44; }
.rsi-send:hover { opacity: 0.85; }
.rsi-send:active { transform: scale(0.93); }
.rsi-send:disabled { opacity: 0.2; cursor: default; box-shadow: none; }
.rsi-send i { color: white; font-size: 17px; }
</style>
</head>
<body>
<div class="rsi">
  <div class="rsi-header">
    <div class="rsi-title-group">
      <div class="rsi-flame-box"><i class="ti ti-flame"></i></div>
      <div>
        <div class="rsi-name">RSI FORGE</div>
        <div class="rsi-tagline">Collective Recursive Intelligence · Human in the Loop</div>
      </div>
    </div>
    <div class="rsi-status"><div class="rsi-dot"></div> agents online</div>
  </div>

  <div class="rsi-chat" id="rsi-chat">
    <div class="rsi-empty" id="rsi-empty">
      <i class="ti ti-message-bolt"></i>
      <span>paste your human anchor prompt to begin</span>
    </div>
  </div>

  <div class="rsi-footer">
    <div class="rsi-input-row">
      <textarea class="rsi-ta" id="rsi-ta" placeholder="Human Anchor input..." maxlength="2000"></textarea>
      <button class="rsi-send" id="rsi-send" onclick="rsiSend()" aria-label="Send" disabled>
        <i class="ti ti-send-2"></i>
      </button>
    </div>
    <div class="rsi-actions">
      <span class="rsi-hints">↵ send &nbsp;·&nbsp; ⇧↵ new line</span>
      <div class="rsi-right">
        <button class="rsi-clear" onclick="rsiClear()">[ clear ]</button>
        <span class="rsi-count" id="rsi-count">0 / 2000</span>
      </div>
    </div>
  </div>
</div>

<script>
const ta = document.getElementById('rsi-ta');
const chat = document.getElementById('rsi-chat');
const sendBtn = document.getElementById('rsi-send');
const countEl = document.getElementById('rsi-count');
let msgCount = 0;

const responses = [
  "Recursive pass initiated. Cross-agent synthesis underway — convergent output inbound.",
  "Anchor received. Propagating signal through collective inference layers.",
  "Human vector logged. Agents 2 and 4 diverging on interpretation — arbitration in progress.",
  "Pattern match: 94.2% resonance with prior anchor class. Proceeding with delta analysis.",
  "Synthesis complete. Three coherent pathways identified — awaiting your next anchor.",
  "Signal integrated. Loop iteration #" + (Math.floor(Math.random()*80)+12) + " complete. Forging next response layer.",
];

function ts() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

ta.addEventListener('input', () => {
  const len = ta.value.length;
  countEl.textContent = len + ' / 2000';
  countEl.classList.toggle('warn', len > 1600);
  sendBtn.disabled = !ta.value.trim();
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
});

ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) rsiSend(); }
});

function addMsg(role, text) {
  document.getElementById('rsi-empty')?.remove();
  const isYou = role === 'you';
  const d = document.createElement('div');
  d.className = 'rsi-msg ' + role;
  d.innerHTML = `
    <div class="rsi-av ${isYou ? 'av-you' : 'av-agent'}">
      <i class="ti ${isYou ? 'ti-user' : 'ti-cpu'}"></i>
    </div>
    <div class="rsi-bubble-wrap">
      <div class="rsi-bubble">${text}</div>
      <div class="rsi-meta">${isYou ? 'you' : 'RSI Forge'} · ${ts()}</div>
    </div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  msgCount++;
}

function showTyping() {
  document.getElementById('rsi-empty')?.remove();
  const d = document.createElement('div');
  d.className = 'rsi-msg agent'; d.id = 'rsi-typing';
  d.innerHTML = `<div class="rsi-av av-agent"><i class="ti ti-cpu"></i></div>
    <div class="rsi-typing-bubble"><span></span><span></span><span></span></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function rsiSend() {
  const text = ta.value.trim();
  if (!text) return;
  addMsg('you', text);
  ta.value = ''; ta.style.height = 'auto';
  countEl.textContent = '0 / 2000';
  sendBtn.disabled = true;
  showTyping();
  setTimeout(() => {
    document.getElementById('rsi-typing')?.remove();
    addMsg('agent', responses[msgCount % responses.length]);
  }, 850 + Math.random() * 600);
}

function rsiClear() {
  chat.innerHTML = '';
  const e = document.createElement('div');
  e.className = 'rsi-empty'; e.id = 'rsi-empty';
  e.innerHTML = '<i class="ti ti-message-bolt"></i><span>paste your human anchor prompt to begin</span>';
  chat.appendChild(e);
  msgCount = 0;
}
</script>
</body>
</html>
