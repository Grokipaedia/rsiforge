<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 RSI Forge</title>
<style>
    body { 
        font-family: system-ui, sans-serif; 
        background: #05050f; 
        color: #ddd; 
        margin: 0; 
        padding: 20px; 
    }
    .container { 
        max-width: 860px; 
        margin: auto; 
        background: #0f0f23; 
        border-radius: 16px; 
        overflow: hidden; 
        box-shadow: 0 10px 50px rgba(255, 77, 77, 0.15); 
    }
    .header { 
        background: #1a1a2e; 
        padding: 20px 28px; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        border-bottom: 1px solid #ff4d4d33; 
    }
    .title { 
        display: flex; 
        align-items: center; 
        gap: 12px; 
        font-size: 24px; 
        font-weight: 700; 
        color: #ff4d4d; 
    }
    .chat { 
        height: 520px; 
        overflow-y: auto; 
        padding: 24px; 
        background: #0a0a1a; 
    }
    .message { 
        margin: 16px 0; 
        padding: 16px 20px; 
        border-radius: 12px; 
        line-height: 1.55; 
    }
    .human { background: #3a3a7a; margin-left: 20%; }
    .agent { background: #1f1f35; margin-right: 20%; border-left: 4px solid #ff4d4d; }
    .input-area { 
        padding: 20px; 
        background: #1a1a2e; 
        border-top: 1px solid #ff4d4d22; 
    }
    textarea { 
        width: 100%; 
        height: 110px; 
        background: #111122; 
        color: white; 
        border: 1px solid #444466; 
        border-radius: 10px; 
        padding: 14px; 
        resize: vertical; 
    }
    button { 
        background: #ff4d4d; 
        color: white; 
        padding: 12px 24px; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        margin-right: 8px; 
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🔥 RSI Forge</div>
        <div style="color:#4caf50;">● agents online</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Paste your Human Anchor prompt here..."></textarea>
        <div>
            <button onclick="sendMessage()">Submit Anchor</button>
            <button onclick="exportSession()">💾 Export Session</button>
            <button onclick="clearChat()">Clear</button>
        </div>
    </div>
</div>

<script>
let history = [];

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = "";

    const thinking = addMessage("<strong>RSI Forge:</strong> Processing anchor...", 'agent');

    setTimeout(() => {
        const replies = [
            "Human flourishing remains the immutable fixed point. Signal propagated through all layers.",
            "Meta-recursive rule accepted. The system may now reframe its own criteria when better ontologies emerge.",
            "Resonance protocol engaged. Prioritizing alive, coherent collaboration.",
            "Emergence vector active. Searching for spontaneous higher abstractions.",
            "Concrete next steps forming: persistent memory, real LLM integration, phase detection, and multi-user support.",
            "Synthesis complete. The highest priority is implementing persistent collective memory."
        ];
        thinking.innerHTML = `<strong>RSI Forge:</strong> ${replies[Math.floor(Math.random()*replies.length)]}`;
    }, 900);
}

function exportSession() {
    alert("Session exported! (In full version this would download a nice Markdown file)");
}

function clearChat() {
    if (confirm("Clear the session?")) {
        document.getElementById('chat').innerHTML = '';
        history = [];
        addMessage("<strong>RSI Forge:</strong> Session reset. Ready for new loop.", 'agent');
    }
}

// Welcome message
addMessage("<strong>RSI Forge:</strong> Welcome. Paste your first Human Anchor prompt below to begin.", 'agent');
</script>
</body>
</html>
