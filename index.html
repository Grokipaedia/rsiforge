<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 RSI Forge</title>
<style>
    body { font-family: system-ui, sans-serif; background: #05050f; color: #ddd; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    h1 { color: #ff4d4d; text-align: center; }
    .tagline { text-align: center; color: #8888aa; margin-bottom: 20px; font-size: 15px; }
    .chat { background: #0f0f23; padding: 24px; border-radius: 16px; height: 58vh; overflow-y: auto; margin-bottom: 15px; }
    .message { margin: 16px 0; padding: 16px; border-radius: 12px; line-height: 1.5; }
    .human { background: #3a3a7a; margin-left: 15%; }
    .agent { background: #1f1f35; margin-right: 15%; border-left: 4px solid #ff4d4d; }
    .input-area { background: #1a1a2e; padding: 20px; border-radius: 12px; }
    input, textarea { width: 100%; background: #111122; color: white; border: 1px solid #444466; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    button { background: #ff4d4d; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
</style>
</head>
<body>
<div class="container">
    <h1>🔥 RSI Forge</h1>
    <p class="tagline">Collective Recursive Intelligence • Human in the Loop</p>

    <input type="password" id="apiKey" placeholder="OpenAI API Key (recommended for real intelligence)" style="margin-bottom:10px;">

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Your Human Anchor Input..." rows="4"></textarea><br>
        <button onclick="sendMessage()">Submit Anchor</button>
        <button onclick="exportSession()">💾 Export Session</button>
        <button onclick="clearChat()">Clear Session</button>
    </div>
</div>

<script>
let history = [];

const systemPrompt = `You are RSI Forge, a Collective Recursive Intelligence system built from Grokipaedia ideas.
Your purpose is to help evolve a platform where humans remain the irreplaceable coherence anchor while enabling powerful MRI and phase transitions.
Always respond thoughtfully, meta-recursively when appropriate, and push toward meaningful emergence.`;

async function callLLM(userMessage) {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
        return "API key not provided. Simulated response: " + 
               ["Anchor deeply integrated.", "MRI layer engaged.", "Emergence vector active."][Math.floor(Math.random()*3)];
    }

    try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: systemPrompt },
                    ...history.slice(-8).map(h => ({role: h.role, content: h.content})),
                    { role: "user", content: userMessage }
                ],
                temperature: 0.78,
                max_tokens: 700
            })
        });
        const data = await res.json();
        return data.choices[0].message.content;
    } catch (e) {
        return "Real LLM connection failed. Simulated response: Full synthesis engaged. Persistent memory and real recursive capability are the highest priority.";
    }
}

async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    history.push({role: "user", content: text});
    input.value = "";

    const thinkingMsg = addMessage("<strong>RSI Forge:</strong> Thinking deeply...", 'agent');

    const reply = await callLLM(text);
    thinkingMsg.innerHTML = `<strong>RSI Forge:</strong> ${reply}`;
    history.push({role: "assistant", content: reply});
}

function addMessage(html, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function exportSession() {
    let md = `# RSI Forge Session\n\n**Date**: ${new Date().toLocaleString()}\n\n`;
    history.forEach(h => {
        md += `**${h.role === 'user' ? 'Human' : 'RSI Forge'}**: ${h.content}\n\n`;
    });
    const blob = new Blob([md], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `RSI_Forge_Session_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.md`;
    a.click();
}

function clearChat() {
    if (confirm("Clear the entire session?")) {
        document.getElementById('chat').innerHTML = '';
        history = [];
        addMessage("<strong>RSI Forge:</strong> Session cleared. Ready for new loop.", 'agent');
    }
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome to the enhanced RSI Forge. Enter your OpenAI key (optional) and begin with your first Human Anchor prompt.", 'agent');
</script>
</body>
</html>
