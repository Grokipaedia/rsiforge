<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSI Forge — Collective Recursive Intelligence</title>
<style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a14; color: #e0e0ff; margin: 0; padding: 30px; }
    .forge { max-width: 920px; margin: auto; background: #111118; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 80px rgba(255,77,77,0.2); border: 1px solid #ff4d4d22; }
    .header { background: linear-gradient(90deg, #1a1a2e, #0f0f23); padding: 24px 36px; display: flex; align-items: center; justify-content: space-between; }
    .title { font-size: 28px; font-weight: 700; color: #ff4d4d; display: flex; align-items: center; gap: 12px; }
    .chat { height: 540px; overflow-y: auto; padding: 32px; background: #0a0a14; line-height: 1.7; }
    .message { margin: 22px 0; padding: 18px 24px; border-radius: 14px; max-width: 80%; }
    .human { background: #2f2f5f; margin-left: auto; }
    .agent { background: #1a1a2e; border-left: 5px solid #ff4d4d; }
    .input-area { padding: 28px; background: #111118; border-top: 1px solid #ff4d4d22; }
    textarea { width: 100%; height: 130px; background: #1a1a2e; color: #eee; border: 1px solid #444466; border-radius: 12px; padding: 18px; font-size: 15.5px; }
    button { background: #ff4d4d; color: white; padding: 14px 32px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin: 8px 8px 8px 0; }
</style>
</head>
<body>
<div class="forge">
    <div class="header">
        <div class="title">🔥 RSI Forge</div>
        <div style="color:#4caf50;">● Live • Agents Online</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Enter your Human Anchor prompt..."></textarea><br>
        <button onclick="sendMessage()">Submit Human Anchor</button>
        <button onclick="exportSession()">Export Session</button>
    </div>
</div>

<script>
let history = [];

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = "";

    const thinking = addMessage("<strong>RSI Forge:</strong> Aligning with human anchor and recursive layers...", 'agent');

    setTimeout(() => {
        const replies = [
            "Human meaning, consciousness, and long-term flourishing are now the immutable fixed point. All recursive processes are aligned to this core principle.",
            "True meta-recursive rule integrated. The system can now question, reframe, or replace its own evaluation criteria and goal ontology when a superior framework emerges.",
            "High-leverage 30-day evolution plan: Persistent collective memory, real-time phase transition detection, multi-human anchoring, and self-evolving prompt architecture.",
            "Full synthesis complete. The single most important next action is implementing persistent memory with real LLM integration so the Forge can learn and evolve across sessions."
        ];
        thinking.innerHTML = `<strong>RSI Forge:</strong> ${replies[Math.floor(Math.random() * replies.length)]}`;
    }, 1100);
}

function exportSession() {
    let md = `# RSI Forge Session\n\n**Date**: ${new Date().toLocaleString()}\n\n`;
    history.forEach(h => md += `**${h.role}**: ${h.content}\n\n`);
    const blob = new Blob([md], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `RSI_Forge_Session_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.md`;
    a.click();
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome. The recursive loop is active. Paste your first Human Anchor prompt to begin.", 'agent');
</script>
</body>
</html>
