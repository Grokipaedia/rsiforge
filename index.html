<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 RSI Forge</title>
<style>
    body { font-family: system-ui, sans-serif; background: #05050f; color: #ddd; margin: 0; padding: 20px; }
    .container { max-width: 820px; margin: auto; }
    h1 { color: #ff4d4d; text-align: center; margin-bottom: 8px; }
    .tagline { text-align: center; color: #8888aa; margin-bottom: 30px; }
    .chat { background: #0f0f23; padding: 24px; border-radius: 16px; height: 58vh; overflow-y: auto; margin-bottom: 20px; }
    .message { margin: 18px 0; padding: 16px; border-radius: 12px; line-height: 1.5; }
    .human { background: #3a3a7a; margin-left: 15%; }
    .agent { background: #1f1f35; margin-right: 15%; border-left: 4px solid #ff4d4d; }
    textarea { width: 100%; background: #111122; color: white; border: 1px solid #444466; border-radius: 10px; padding: 14px; resize: vertical; }
    button { background: #ff4d4d; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
</style>
</head>
<body>
<div class="container">
    <h1>🔥 RSI Forge</h1>
    <p class="tagline">Collective Recursive Intelligence • Human in the Loop</p>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Human Anchor Input..." rows="4"></textarea><br>
        <button onclick="sendMessage()">Submit Anchor</button>
        <button onclick="exportSession()">💾 Export Session</button>
        <button onclick="clearChat()">Clear</button>
    </div>
</div>

<script>
let history = [];

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

const contextualResponses = [
    "Understood. Human flourishing locked as the immutable fixed point. Propagating through all layers.",
    "Meta-recursive rule accepted. The Forge now has explicit permission to reframe its own criteria when superior ontologies appear.",
    "Resonance protocol active. Prioritizing coherent, alive collaboration over raw efficiency.",
    "Emergence vector engaged. Looking for opportunities to dissolve the problem into higher abstractions.",
    "Concrete 30-day roadmap forming: persistent memory, smart phase detection, exportable case studies, and multi-user anchoring.",
    "Full synthesis: The highest-leverage next step is implementing persistent memory + real LLM integration so the Forge can truly learn."
];

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    history.push({role: "human", content: text});
    input.value = "";

    setTimeout(() => {
        const response = contextualResponses[Math.floor(Math.random() * contextualResponses.length)];
        addMessage(`<strong>RSI Forge:</strong> ${response}`, 'agent');
        history.push({role: "agent", content: response});
    }, 800);
}

function exportSession() {
    let md = `# RSI Forge Session\n\n**Date**: ${new Date().toLocaleString()}\n\n`;
    history.forEach(h => {
        md += `**${h.role === 'human' ? 'Human' : 'RSI Forge'}**: ${h.content}\n\n`;
    });
    const blob = new Blob([md], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `RSI_Forge_Session_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.md`;
    a.click();
}

function clearChat() {
    if (confirm("Clear session?")) {
        document.getElementById('chat').innerHTML = '';
        history = [];
        addMessage("<strong>RSI Forge:</strong> Session cleared. Ready for new loop.", 'agent');
    }
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome. Paste your first Human Anchor prompt to begin the recursive loop.", 'agent');
</script>
</body>
</html>
