<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 RSI Forge</title>
<style>
    body { font-family: system-ui, sans-serif; background: #05050f; color: #ddd; margin: 0; padding: 20px; }
    .container { max-width: 820px; margin: auto; }
    h1 { color: #ff4d4d; text-align: center; margin-bottom: 8px; }
    .tagline { text-align: center; color: #8888aa; margin-bottom: 30px; }
    .chat { background: #0f0f23; padding: 24px; border-radius: 16px; height: 62vh; overflow-y: auto; margin-bottom: 20px; }
    .message { margin: 18px 0; padding: 16px; border-radius: 12px; line-height: 1.5; }
    .human { background: #3a3a7a; margin-left: 15%; }
    .agent { background: #1f1f35; margin-right: 15%; border-left: 4px solid #ff4d4d; }
    .input-area { background: #1a1a2e; padding: 20px; border-radius: 12px; }
    textarea { width: 100%; height: 110px; background: #111122; color: white; border: 1px solid #444466; border-radius: 10px; padding: 14px; resize: vertical; }
    button { background: #ff4d4d; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
    .feedback { font-size: 12px; color: #8888aa; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
    <h1>🔥 RSI Forge</h1>
    <p class="tagline">Collective Recursive Intelligence • Human in the Loop</p>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="problem" placeholder="Initial Problem / Goal (optional)"></textarea>
        <textarea id="input" placeholder="Human Anchor Input..."></textarea><br>
        <button onclick="sendMessage()">Submit Anchor</button>
        <button onclick="clearChat()" style="background:#444;">Clear Session</button>
    </div>
</div>

<script>
const chat = document.getElementById('chat');

function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = '';

    // Simulate thoughtful response
    setTimeout(() => {
        const responses = [
            "Anchor received and integrated. Human flourishing remains the immutable fixed point.",
            "MRI layer activated. System now has permission to reframe its own criteria when superior ontologies appear.",
            "Resonance increased. Prioritizing coherent, alive collaboration over pure optimization.",
            "Emergence protocol engaged. Searching for spontaneous reframing and higher abstraction opportunities.",
            "Concrete evolution path forming: Persistent memory, smart phase detection, exportable case studies, and multi-user anchoring are high priority.",
            "Synthesis complete. The single most important next step is implementing persistent memory + real LLM integration."
        ];
        const response = responses[Math.floor(Math.random() * responses.length)];
        addMessage(`<strong>RSI Forge:</strong> ${response}`, 'agent');

        // Feedback option
        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.innerHTML = `<button onclick="giveFeedback(this)">👍 Useful</button> <button onclick="giveFeedback(this)">👎 Needs improvement</button>`;
        chat.lastChild.appendChild(feedback);
    }, 900);
}

function giveFeedback(btn) {
    btn.parentElement.innerHTML = "✅ Feedback recorded. Thank you.";
}

function clearChat() {
    if (confirm("Clear the entire session?")) {
        chat.innerHTML = '';
        addMessage("<strong>RSI Forge:</strong> Session cleared. Ready for new loop.", 'agent');
    }
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome. Enter your initial problem (optional) and begin with your first Human Anchor prompt.", 'agent');
</script>
</body>
</html>
