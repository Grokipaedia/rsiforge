<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSI Forge</title>
<style>
    body { 
        font-family: system-ui, sans-serif; 
        background: #0a0a14; 
        color: #e0e0ff; 
        margin: 0; 
        padding: 30px; 
    }
    .container { 
        max-width: 860px; 
        margin: auto; 
        background: #111118; 
        border-radius: 20px; 
        overflow: hidden; 
        box-shadow: 0 20px 60px rgba(0,0,0,0.6); 
    }
    .header { 
        background: #1a1a2e; 
        padding: 24px 32px; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
    }
    .title { 
        font-size: 26px; 
        font-weight: 700; 
        color: #ff4d4d; 
    }
    .chat { 
        height: 520px; 
        overflow-y: auto; 
        padding: 28px; 
        background: #0a0a1a; 
    }
    .message { 
        margin: 18px 0; 
        padding: 18px 22px; 
        border-radius: 14px; 
        line-height: 1.6; 
    }
    .human { background: #3a3a7a; margin-left: auto; }
    .agent { background: #1f1f35; border-left: 5px solid #ff4d4d; }
    .input-area { 
        padding: 24px; 
        background: #1a1a2e; 
    }
    textarea { 
        width: 100%; 
        height: 120px; 
        background: #1a1a2e; 
        color: white; 
        border: 1px solid #444466; 
        border-radius: 12px; 
        padding: 16px; 
    }
    button { 
        background: #ff4d4d; 
        color: white; 
        padding: 14px 32px; 
        border: none; 
        border-radius: 10px; 
        cursor: pointer; 
        margin: 8px 8px 8px 0; 
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🔥 RSI Forge</div>
        <div style="color:#4caf50;">● Live • Agents Online</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Paste your Human Anchor prompt here..."></textarea><br>
        <button onclick="sendMessage()">Submit Anchor</button>
        <button onclick="exportSession()">Export Session</button>
    </div>
</div>

<script>
let history = [];

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = "";

    const thinking = addMessage("<strong>RSI Forge:</strong> Processing anchor...", 'agent');

    setTimeout(() => {
        const replies = [
            "Human flourishing is locked as the immutable fixed point. All recursive layers are aligned.",
            "Meta-recursive rule integrated. The system can now reframe its own criteria when superior frameworks emerge.",
            "30-day high-leverage plan: persistent memory, phase transition detection, multi-human anchoring.",
            "Synthesis complete. The most important next step is persistent memory + real recursive capability."
        ];
        thinking.innerHTML = `<strong>RSI Forge:</strong> ${replies[Math.floor(Math.random() * replies.length)]}`;
    }, 800);
}

function exportSession() {
    alert("Session exported (full version will download Markdown)");
}

addMessage("<strong>RSI Forge:</strong> Welcome. Paste your first Human Anchor prompt to begin.", 'agent');
</script>
</body>
</html>
