<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 RSI Forge</title>
<style>
    body { font-family: system-ui, sans-serif; background: #05050f; color: #ddd; margin: 0; padding: 20px; }
    .container { max-width: 860px; margin: auto; }
    h1 { color: #ff4d4d; text-align: center; }
    .tagline { text-align: center; color: #8888aa; margin-bottom: 20px; }
    .chat { background: #0f0f23; padding: 24px; border-radius: 16px; height: 55vh; overflow-y: auto; margin-bottom: 15px; }
    .message { margin: 16px 0; padding: 16px; border-radius: 12px; line-height: 1.5; }
    .human { background: #3a3a7a; margin-left: 15%; }
    .agent { background: #1f1f35; margin-right: 15%; border-left: 4px solid #ff4d4d; }
    .input-area { background: #1a1a2e; padding: 20px; border-radius: 12px; }
    textarea, input { width: 100%; background: #111122; color: white; border: 1px solid #444466; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    button { background: #ff4d4d; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin: 5px 5px 5px 0; }
</style>
</head>
<body>
<div class="container">
    <h1>🔥 RSI Forge</h1>
    <p class="tagline">Collective Recursive Intelligence • Human in the Loop</p>

    <input type="password" id="apiKey" placeholder="OpenAI API Key (optional but recommended)" style="width:100%; margin-bottom:10px;">

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Human Anchor Input..." rows="3"></textarea>
        <button onclick="sendMessage()">Submit Anchor</button>
        <button onclick="exportSession()">💾 Export Session</button>
        <button onclick="clearChat()">Clear</button>
    </div>
</div>

<script>
let history = [];

const systemPrompt = `You are RSI Forge, a Collective Recursive Intelligence system. 
You are helping evolve a platform that combines human anchors with recursive self-improvement.
Always stay coherent with human flourishing as the fixed point.
Be insightful, meta-recursive when appropriate, and push toward phase transitions.`;

async function callLLM(userMessage) {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
        return "API key not provided. Using simulated response: " + 
               ["Anchor deeply integrated.", "MRI layer engaged.", "Resonance protocol active."][Math.floor(Math.random()*3)];
    }

    try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: systemPrompt },
                    ...history.slice(-6).map(h => ({role: h.role, content: h.content})),
                    { role: "user", content: userMessage }
                ],
                temperature: 0.82,
                max_tokens: 600
            })
        });
        const data = await response.json();
        return data.choices[0].message.content;
    } catch (e) {
        return "Connection error. Simulated response: Full synthesis engaged. Persistent memory and real recursive loops are high priority.";
    }
}

async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    history.push({role: "user", content: text});
    input.value = "";

    const thinking = addMessage("<strong>RSI Forge:</strong> Thinking...", 'agent');

    const reply = await callLLM(text);
    thinking.innerHTML = `<strong>RSI Forge:</strong> ${reply}`;
    history.push({role: "assistant", content: reply});
}

function addMessage(html, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function exportSession() {
    let md = `# RSI Forge Session\n\n**Date**: ${new Date().toLocaleString()}\n\n`;
    history.forEach(h => {
        md += `**${h.role === 'user' ? 'Human' : 'RSI Forge'}**: ${h.content}\n\n`;
    });
    const blob = new Blob([md], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `RSI_Forge_Session_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.md`;
    a.click();
}

function clearChat() {
    if (confirm("Clear session?")) {
        document.getElementById('chat').innerHTML = '';
        history = [];
        addMessage("<strong>RSI Forge:</strong> Session cleared. Ready for new loop.", 'agent');
    }
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome. Enter your OpenAI key (optional) and paste your first Human Anchor prompt.", 'agent');
</script>
</body>
</html>
